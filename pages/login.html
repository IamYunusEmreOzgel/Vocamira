<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your Vocamira account.">
  <title>Login | Vocamira</title>
  <link rel="icon" href="../assets/images/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/nav.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>
  <main class="app-shell">
    <header class="site-header">
      <a class="site-logo" href="../index.html" aria-label="Vocamira home">
        <img src="../assets/images/vocamira-logo.svg" alt="Vocamira">
      </a>

      <button id="menu-toggle" class="menu-toggle" type="button" aria-label="Open navigation" aria-expanded="false" aria-controls="site-nav">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav id="site-nav" class="site-nav" aria-label="Main navigation">
        <a href="../index.html">Home</a>
        <a href="study.html">Study</a>
        <a href="how-it-works.html">How it works</a>
        <a class="active" href="login.html" aria-current="page">Login</a>
        <a class="play-link" href="game.html">Play</a>
      </nav>
    </header>

    <section class="auth-layout">
      <div class="auth-card">
        <p class="eyebrow">Welcome back</p>
        <h1>Sign in</h1>
        <p class="auth-description">Use the account details provided by the Vocamira administrator.</p>

        <form id="login-form" class="auth-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
          </div>

          <button id="login-button" class="primary-button auth-button" type="submit">Sign In</button>
        </form>

        <p id="login-message" class="auth-message" role="status" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase.js"></script>
  <script src="../assets/js/nav.js"></script>
  <script src="../assets/js/login.js"></script>
</body>
</html>
