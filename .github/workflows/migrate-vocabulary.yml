name: Migrate vocabulary data

on:
  push:
    paths:
      - ".github/workflows/migrate-vocabulary.yml"

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Migrate vocabulary files
        run: python scripts/migrate_vocabulary.py

      - name: Commit migrated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Organize vocabulary files by CEFR level"
          git push
