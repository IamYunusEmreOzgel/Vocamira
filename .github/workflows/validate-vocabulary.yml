name: Validate vocabulary data

on:
  push:
    paths:
      - "data/**"
      - "scripts/validate-vocabulary.mjs"
      - ".github/workflows/validate-vocabulary.yml"
  pull_request:
    paths:
      - "data/**"
      - "scripts/validate-vocabulary.mjs"
      - ".github/workflows/validate-vocabulary.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate vocabulary files
        run: node scripts/validate-vocabulary.mjs
